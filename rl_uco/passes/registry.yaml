# Nested adaptors (Phase 0: limited nesting)
adaptors:
  - id: 101
    name: module
    pipeline: "module({inner})"
    kind: adaptor
    max_depth: 2
  - id: 102
    name: cgscc
    pipeline: "cgscc({inner})"
    kind: adaptor
    max_depth: 2
  - id: 103
    name: function
    pipeline: "function({inner})"
    kind: adaptor
    max_depth: 2
  - id: 104
    name: loop
    pipeline: "loop({inner})"
    kind: adaptor
    max_depth: 2

